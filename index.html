<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdQuest — Verified Attention Protocol</title>
    <meta name="description" content="Gamified ad verification protocol. 2.0x engagement lift validated through real user A/B testing.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        html { scroll-behavior: smooth; }
        body {
            background: #07060d;
            min-height: 100vh;
            color: white;
            background-image:
                radial-gradient(1000px circle at 15% -5%, rgba(168,85,247,0.16), transparent 55%),
                radial-gradient(900px circle at 90% 10%, rgba(59,130,246,0.14), transparent 55%);
            background-attachment: fixed;
        }
        .glass { background: rgba(255,255,255,0.035); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }
        .glass-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.10); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.4); }
        .gradient-text { background: linear-gradient(135deg, #c084fc, #60a5fa 60%, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-green { background: linear-gradient(135deg, #4ade80, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #3b82f6); transition: all 0.3s; box-shadow: 0 10px 30px -10px rgba(168,85,247,0.6); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(168,85,247,0.7), 0 10px 30px -10px rgba(168,85,247,0.8); }
        .btn-secondary { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.02); transition: all 0.3s; color: #cbd5e1; backdrop-filter: blur(10px); }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); color: white; transform: translateY(-2px); }
        .bg-grid { background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px); background-size: 44px 44px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%); -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%); }
        .friction-bar { position: relative; height: 56px; border-radius: 14px; overflow: hidden; }
        .friction-fill { height: 100%; display: flex; align-items: center; padding: 0 16px; transition: width 1.5s cubic-bezier(0.25,0.8,0.25,1); }
        .friction-label { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-weight: 700; font-size: 14px; }
        .step-line { background: linear-gradient(180deg, rgba(168,85,247,0.4), rgba(59,130,246,0.4), rgba(34,211,238,0.2)); }
        .nav-link { color: #cbd5e1; transition: color 0.2s; }
        .nav-link:hover { color: white; }
        .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.25,0.8,0.25,1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef } = React;

        function Icon(props) {
            const iconRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [props.name]);
            return React.createElement('i', {
                'data-lucide': props.name,
                className: props.className || "",
                style: { width: props.size || 24, height: props.size || 24, ...(props.style || {}) },
                ref: iconRef
            });
        }

        // Reveal-on-scroll wrapper
        function Reveal({ children, className }) {
            const ref = useRef(null);
            const [seen, setSeen] = useState(false);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setSeen(true); io.disconnect(); } }, { threshold: 0.15 });
                io.observe(el);
                return () => io.disconnect();
            }, []);
            return React.createElement('div', { ref, className: `${className || ''} reveal ${seen ? 'visible' : ''}` }, children);
        }

        // === REAL DATA from test files (93 unique real users, developer excluded) ===
        const REAL = {
            users: 93,
            sessions: 118,
            controlAvg: 6.9,
            adquestAvg: 13.7,
            ratio: '2.0x',
            completion: 27,
            controlSessions: 36,
            adquestSessions: 51,
        };

        function Nav() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            const links = [
                { href: 'demo.html', label: 'Demo' },
                { href: 'chart.html', label: 'Data' },
                { href: 'storyboard.html', label: 'Storyboard' },
                { href: 'https://drive.google.com/file/d/1NKfFQWqze6dm7AEcDtFYx2HdhDPnYhXI/view?usp=sharing', label: 'Pitch Deck', ext: true },
            ];
            return React.createElement('header', {
                className: `fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? 'py-2' : 'py-4'}`
            },
                React.createElement('div', { className: 'max-w-6xl mx-auto px-4' },
                    React.createElement('div', {
                        className: `flex items-center justify-between rounded-2xl px-4 sm:px-5 py-3 transition-all duration-300 ${scrolled ? 'glass-strong' : 'border border-transparent'}`
                    },
                        React.createElement('a', { href: '#', className: 'flex items-center gap-2.5 group' },
                            React.createElement('div', { className: 'w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/30 group-hover:scale-110 transition' },
                                React.createElement(Icon, { name: 'zap', size: 18, className: 'text-white' })
                            ),
                            React.createElement('span', { className: 'font-black text-lg tracking-tight' }, 'AdQuest')
                        ),
                        React.createElement('nav', { className: 'hidden md:flex items-center gap-7' },
                            links.map((l, i) => React.createElement('a', {
                                key: i, href: l.href, target: l.ext ? '_blank' : undefined,
                                className: 'nav-link text-sm font-medium'
                            }, l.label))
                        ),
                        React.createElement('a', { href: 'demo.html', className: 'btn-primary px-4 py-2 rounded-xl text-sm font-bold text-white flex items-center gap-2' },
                            React.createElement(Icon, { name: 'play', size: 14, className: 'fill-current' }),
                            'Launch'
                        )
                    )
                )
            );
        }

        function Hero() {
            return React.createElement('section', { className: 'min-h-screen flex items-center justify-center relative overflow-hidden px-4 pt-28 pb-20' },
                React.createElement('div', { className: 'absolute inset-0 bg-grid opacity-40' }),
                React.createElement('div', { className: 'absolute top-[-10%] left-[-10%] w-[45%] h-[45%] bg-purple-600/15 rounded-full blur-[120px] pointer-events-none' }),
                React.createElement('div', { className: 'absolute bottom-[-10%] right-[-10%] w-[45%] h-[45%] bg-blue-600/15 rounded-full blur-[120px] pointer-events-none' }),
                React.createElement('div', { className: 'relative z-10 max-w-5xl mx-auto text-center' },
                    React.createElement('div', { className: 'mb-8 inline-flex items-center gap-3 glass px-5 py-2 rounded-full' },
                        React.createElement('div', { className: 'w-2 h-2 bg-green-400 rounded-full animate-pulse' }),
                        React.createElement('span', { className: 'text-gray-300 font-mono text-xs tracking-[0.2em] uppercase' }, 'Protocol v9.0')
                    ),
                    React.createElement('h1', { className: 'text-5xl md:text-7xl lg:text-8xl font-black mb-8 leading-[1.05] tracking-tight' },
                        'From Forced Views',
                        React.createElement('br'),
                        'To ',
                        React.createElement('span', { className: 'gradient-text' }, 'Verified Discovery.')
                    ),
                    React.createElement('p', { className: 'text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed font-light' },

                    React.createElement('div', { className: 'flex flex-wrap justify-center gap-4 sm:gap-6 mb-12' },

                            { icon: 'trending-up', bg: 'bg-blue-500/15', fg: 'text-blue-400', val: REAL.ratio, label: 'Engagement Lift' },
                            { icon: 'bar-chart', bg: 'bg-purple-500/15', fg: 'text-purple-400', val: REAL.completion + '%', label: 'Completion' },
                        ].map((s, i) => React.createElement('div', { key: i, className: 'glass rounded-2xl px-5 py-3 flex items-center gap-3' },
                            React.createElement('div', { className: `w-9 h-9 rounded-xl ${s.bg} flex items-center justify-center` },
                                React.createElement(Icon, { name: s.icon, size: 18, className: s.fg })
                            ),
                            React.createElement('div', { className: 'text-left' },
                                React.createElement('div', { className: 'text-white font-bold leading-none' }, s.val),
                                React.createElement('div', { className: 'text-[11px] text-gray-400 mt-0.5' }, s.label)

                    ),
                    React.createElement('div', { className: 'flex flex-col sm:flex-row gap-4 justify-center items-stretch sm:items-center' },
                        React.createElement('a', { href: 'demo.html', className: 'btn-primary px-8 py-4 rounded-xl font-bold text-white text-lg flex items-center justify-center gap-3 min-w-[220px]' },
                            React.createElement(Icon, { name: 'play-circle', size: 20, className: 'fill-current' }),
                            'Launch Demo'
                        ),
                        React.createElement('a', { href: 'chart.html', className: 'btn-secondary px-8 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-3 min-w-[220px]' },
                            React.createElement(Icon, { name: 'bar-chart-3', size: 20 }),
                            'View Data'
                        )
                    ),
                    React.createElement('div', { className: 'flex flex-wrap gap-3 justify-center items-center mt-6' },
                        React.createElement('a', { href: 'storyboard.html', className: 'px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 text-gray-400 hover:text-white transition border border-white/10 hover:border-white/30' },

                        React.createElement('a', { href: 'https://drive.google.com/file/d/1NKfFQWqze6dm7AEcDtFYx2HdhDPnYhXI/view?usp=sharing', target: '_blank', className: 'px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 text-gray-400 hover:text-white transition border border-white/10 hover:border-white/30' },
                            React.createElement(Icon, { name: 'presentation', size: 15 }),
                            'Pitch Deck'
                        )
                    )
                )
            );
        }

        function SectionHeading({ kicker, title, gradient, desc }) {
            return React.createElement('div', { className: 'text-center mb-14 max-w-2xl mx-auto' },
                kicker ? React.createElement('div', { className: 'font-mono text-xs tracking-[0.2em] uppercase text-purple-400 mb-3' }, kicker) : null,
                React.createElement('h2', { className: 'text-3xl md:text-5xl font-black text-white mb-4 tracking-tight' },
                    title, ' ',
                    gradient ? React.createElement('span', { className: gradient.cls }, gradient.txt) : null
                ),
                desc ? React.createElement('p', { className: 'text-gray-400 text-base md:text-lg leading-relaxed' }, desc) : null
            );
        }

        function HowItWorks() {
            const steps = [
                { icon: 'eye', title: 'Prime', desc: 'Mystery prompt captures attention before the ad loads.', color: '#a855f7' },
                { icon: 'play', title: 'Watch', desc: 'Brand video plays in full. Users watch voluntarily.', color: '#3b82f6' },
                { icon: 'fingerprint', title: 'Verify', desc: 'Quick challenge proves real attention. Tap or hold.', color: '#06b6d4' },
                { icon: 'gift', title: 'Reward', desc: 'Variable tier reward unlocks. Gold / Silver / Bronze.', color: '#22c55e' }
            ];
            return React.createElement(Reveal, { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-6xl mx-auto' },
                    React.createElement(SectionHeading, {
                        kicker: 'The Protocol',
                        title: 'How It',
                        gradient: { cls: 'gradient-text', txt: 'Works' },
                        desc: 'Four steps from impression to verified attention.'
                    }),
                    React.createElement('div', { className: 'relative grid grid-cols-2 md:grid-cols-4 gap-6' },
                        // connector line (desktop)
                        React.createElement('div', { className: 'hidden md:block absolute top-8 left-[12%] right-[12%] h-px step-line opacity-60' }),
                        steps.map((s, i) => React.createElement('div', { key: i, className: 'relative glass rounded-2xl p-6 text-center hover:-translate-y-1.5 transition-all duration-300' },
                            React.createElement('div', { className: 'w-16 h-16 mx-auto mb-5 rounded-2xl flex items-center justify-center relative z-10', style: { background: s.color + '1a', border: '1px solid ' + s.color + '40', boxShadow: `0 0 30px ${s.color}25` } },
                                React.createElement(Icon, { name: s.icon, size: 28, style: { color: s.color } })
                            ),
                            React.createElement('div', { className: 'font-mono text-[10px] tracking-widest text-gray-500 mb-2 uppercase' }, `Step ${i + 1}`),
                            React.createElement('h3', { className: 'text-lg font-bold text-white mb-2' }, s.title),
                            React.createElement('p', { className: 'text-sm text-gray-400 leading-relaxed' }, s.desc)
                        ))
                    )
                )
            );
        }

        function FrictionComparison() {
            const items = [
                { label: 'Forced Video (AdMob)', score: 9.2, barColor: '#ef4444', textColor: '#f87171', note: 'Unskippable, interruptive' },
                { label: 'Rewarded Video (Standard)', score: 5.5, barColor: '#eab308', textColor: '#facc15', note: 'Opt-in, no engagement loop' },
                { label: 'AdQuest Protocol', score: 1.8, barColor: '#22c55e', textColor: '#4ade80', note: 'Gamified, reward-aligned' }
            ];
            return React.createElement(Reveal, { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto' },
                    React.createElement(SectionHeading, {
                        kicker: 'Why It Works',
                        title: 'Friction',
                        gradient: { cls: 'gradient-green', txt: 'Reimagined' },
                        desc: 'Traditional ads create friction. AdQuest reduces it through variable reward alignment.'
                    }),
                    React.createElement('div', { className: 'space-y-5' },
                        items.map((item, i) => React.createElement('div', { key: i, className: 'glass rounded-2xl p-6' },
                            React.createElement('div', { className: 'flex items-center justify-between mb-3' },
                                React.createElement('span', { className: 'font-bold text-white text-sm' }, item.label),
                                React.createElement('span', { className: 'font-mono font-bold text-lg', style: { color: item.textColor } }, item.score + '/10')
                            ),
                            React.createElement('div', { className: 'friction-bar bg-white/5' },
                                React.createElement('div', {
                                    className: 'friction-fill border-r-2',
                                    style: { width: (item.score * 10) + '%', background: item.barColor + '33', borderColor: item.barColor }
                                }),
                                React.createElement('span', { className: 'friction-label', style: { color: item.textColor } }, item.note)
                            )
                        ))
                    ),
                    React.createElement('div', { className: 'mt-8 glass rounded-xl p-6 border-l-4 border-blue-500' },
                        React.createElement('p', { className: 'text-sm text-gray-300 leading-relaxed' },
                            React.createElement('span', { className: 'text-blue-400 font-bold' }, 'Note:'),
                            ' Friction scores are modeled from engagement patterns in our prototype tests. Larger sample needed for validation.'
                        )
                    )
                )
            );
        }

        function VariableRewards() {
            const tiers = [
                { name: 'TIER A', label: 'Gold', gems: '+10', criteria: 'First try, no hints', color: '#eab308', glow: 'rgba(234,179,8,0.4)' },
                { name: 'TIER B', label: 'Silver', gems: '+5', criteria: '< 2 attempts', color: '#3b82f6', glow: 'rgba(59,130,246,0.4)' },
                { name: 'TIER C', label: 'Bronze', gems: '+3', criteria: 'Completed', color: '#9ca3af', glow: 'rgba(156,163,175,0.3)' }
            ];
            return React.createElement(Reveal, { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-5xl mx-auto' },
                    React.createElement(SectionHeading, {
                        kicker: 'Game Loop',
                        title: 'Variable',
                        gradient: { cls: 'gradient-text', txt: 'Reward System' },
                        desc: 'Users compete for higher reward tiers. Engagement becomes part of the game loop.'
                    }),
                    React.createElement('div', { className: 'grid md:grid-cols-3 gap-6' },
                        tiers.map((t, i) => React.createElement('div', {
                            key: i, className: 'glass rounded-2xl p-8 hover:bg-white/[0.06] transition-all duration-300 hover:-translate-y-2 relative overflow-hidden group'
                        },
                            React.createElement('div', { className: 'absolute -top-16 -right-16 w-40 h-40 rounded-full blur-3xl opacity-30 group-hover:opacity-60 transition', style: { background: t.color } }),
                            React.createElement('div', { className: 'relative' },
                                React.createElement('div', { className: 'font-mono text-xs tracking-widest mb-4', style: { color: t.color } }, t.name),
                                React.createElement('div', { className: 'text-5xl font-black text-white mb-2' }, t.gems),
                                React.createElement('div', { className: 'font-bold mb-5 text-lg', style: { color: t.color } }, t.label),
                                React.createElement('div', { className: 'text-sm text-gray-400' }, t.criteria)
                            )
                        ))
                    )
                )
            );
        }

        function Features() {
            const cards = [
                { title: "Mystery Primer", desc: "Captures attention before the ad loads. Zero cold-start friction.", icon: "search", color: '#a855f7' },
                { title: "Hold-to-Verify", desc: "Physical engagement proves real attention. Not a passive click.", icon: "fingerprint", color: '#06b6d4' },
                { title: "Zero-Trust Audit", desc: "Every metric tracked server-side. No inflated impressions.", icon: "shield-check", color: '#3b82f6' }
            ];
            return React.createElement(Reveal, { className: 'py-20 px-4' },
                React.createElement('div', { className: 'max-w-6xl mx-auto grid md:grid-cols-3 gap-6' },
                    cards.map((c, i) => React.createElement('div', { key: i, className: 'glass rounded-2xl p-8 hover:bg-white/[0.06] transition border border-white/5 hover:-translate-y-1.5 duration-300' },
                        React.createElement('div', { className: 'w-12 h-12 rounded-xl flex items-center justify-center mb-5', style: { background: c.color + '1a', border: '1px solid ' + c.color + '40' } },
                            React.createElement(Icon, { name: c.icon, size: 24, style: { color: c.color } })
                        ),
                        React.createElement('h3', { className: 'text-xl font-bold text-white mb-2' }, c.title),
                        React.createElement('p', { className: 'text-gray-400 text-sm leading-relaxed' }, c.desc)
                    ))
                )
            );
        }

        function RealData() {
            return React.createElement(Reveal, { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto text-center' },
                    React.createElement(SectionHeading, {
                        kicker: 'The Evidence',
                        title: 'Verified by',
                        gradient: { cls: 'gradient-text', txt: 'Real Data' },
                        desc: React.isValidElement(null) ? null : undefined
                    }),
                    React.createElement('p', { className: 'text-gray-400 max-w-2xl mx-auto mb-12 leading-relaxed' },
                        'In our A/B test, the control group clicked a button and were forced to wait 10 seconds for a reward. Most abandoned before the wait ended (avg 6.9s). AdQuest users voluntarily watched a video and solved a challenge — staying 2x longer (avg 13.7s). ',
                        React.createElement('span', { className: 'text-white font-mono' }, REAL.users),
                        ' unique real users.'
                    ),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                        [
                            { n: REAL.ratio, l: 'Engagement Lift', color: '#60a5fa' },
                            { n: REAL.controlAvg + 's', l: 'Control Avg', color: '#9ca3af' },
                            { n: REAL.adquestAvg + 's', l: 'AdQuest Avg', color: '#4ade80' },
                            { n: REAL.completion + '%', l: 'Completion Rate', color: '#c084fc' }

                    React.createElement('div', { className: 'mt-8 flex flex-col sm:flex-row gap-4 justify-center' },
                        React.createElement('a', { href: 'chart.html', className: 'btn-secondary px-6 py-3 rounded-xl font-bold text-sm inline-flex items-center justify-center gap-2' },
                            React.createElement(Icon, { name: 'external-link', size: 16 }),
                            'Open Full Report'

                        React.createElement('a', { href: 'real_data.csv', className: 'btn-secondary px-6 py-3 rounded-xl font-bold text-sm inline-flex items-center justify-center gap-2' },

                )

        }

        function Economics() {
            return React.createElement(Reveal, { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto text-center' },
                    React.createElement(SectionHeading, {
                        kicker: 'Business Model',
                        title: 'Attention-Based',
                        gradient: { cls: 'gradient-text', txt: 'Revenue' }
                    }),
                    React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto mb-4' },
                        'Higher verified attention = higher revenue share for publishers.'
                    ),
                    React.createElement('div', { className: 'inline-block px-4 py-1.5 rounded-full bg-yellow-500/10 border border-yellow-500/30 mb-10' },

                    ),
                    React.createElement('div', { className: 'grid md:grid-cols-3 gap-4 items-end h-[320px]' },
                        React.createElement('div', { className: 'flex flex-col items-center justify-end h-full w-full opacity-60' },
