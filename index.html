<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdQuest — Verified Attention Protocol</title>
    <meta name="description" content="Gamified ad verification protocol. 2.0x engagement lift validated through real user A/B testing.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #050507; min-height: 100vh; color: white; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .gradient-text { background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-green { background: linear-gradient(135deg, #22c55e, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #3b82f6); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(168,85,247,0.6); }
        .btn-secondary { border: 1px solid rgba(255,255,255,0.2); background: transparent; transition: all 0.3s; color: #ccc; }
        .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.05); color: white; transform: translateY(-2px); }
        .bg-grid { background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .friction-bar { position: relative; height: 48px; border-radius: 12px; overflow: hidden; }
        .friction-fill { height: 100%; display: flex; align-items: center; padding: 0 16px; transition: width 1.5s cubic-bezier(0.25,0.8,0.25,1); }
        .friction-label { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef } = React;

        function Icon(props) {
            const iconRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [props.name]);
            return React.createElement('i', {
                'data-lucide': props.name,
                className: props.className || "",
                style: { width: props.size || 24, height: props.size || 24 },
                ref: iconRef
            });
        }

        // === REAL DATA from test files (93 unique real users, developer excluded) ===
        const REAL = {
            users: 93,
            sessions: 118,
            controlAvg: 6.9,
            adquestAvg: 13.7,
            ratio: '2.0x',
            completion: 27,
            controlSessions: 36,
            adquestSessions: 51,
        };

        function Hero() {
            return React.createElement('section', { className: 'min-h-screen flex items-center justify-center relative overflow-hidden px-4 py-20' },
                React.createElement('div', { className: 'absolute inset-0 bg-grid opacity-20' }),
                React.createElement('div', { className: 'absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none' }),
                React.createElement('div', { className: 'absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[100px] pointer-events-none' }),
                React.createElement('div', { className: 'relative z-10 max-w-5xl mx-auto text-center' },
                    React.createElement('div', { className: 'mb-8 inline-flex items-center gap-3 glass px-6 py-2 rounded-full border border-white/5' },
                        React.createElement('div', { className: 'w-2 h-2 bg-green-400 rounded-full animate-pulse' }),
                        React.createElement('span', { className: 'text-gray-300 font-mono text-xs tracking-[0.2em] uppercase' }, 'Protocol v9.0')
                    ),
                    React.createElement('h1', { className: 'text-5xl md:text-7xl lg:text-8xl font-black mb-8 leading-tight tracking-tight' },
                        'From Forced Views',
                        React.createElement('br'),
                        'To ',
                        React.createElement('span', { className: 'gradient-text' }, 'Verified Discovery.')
                    ),
                    React.createElement('p', { className: 'text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed font-light' },
                        'We turned passive ad viewing into ',
                        React.createElement('span', { className: 'text-white font-medium' }, 'active, game-like engagement'),
                        '. Users who chose to watch and verify stayed 2x longer than those forced to wait.'
                    ),
                    React.createElement('div', { className: 'flex flex-wrap justify-center gap-6 mb-12' },
                        React.createElement('div', { className: 'flex items-center gap-2 text-sm' },
                            React.createElement('div', { className: 'w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center' },
                                React.createElement(Icon, { name: 'users', size: 16, className: 'text-green-400' })
                            ),
                            React.createElement('span', { className: 'text-gray-300' },
                                React.createElement('span', { className: 'text-white font-bold' }, REAL.users),
                                ' Real Users'
                            )
                        ),
                        React.createElement('div', { className: 'flex items-center gap-2 text-sm' },
                            React.createElement('div', { className: 'w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center' },
                                React.createElement(Icon, { name: 'trending-up', size: 16, className: 'text-blue-400' })
                            ),
                            React.createElement('span', { className: 'text-gray-300' },
                                React.createElement('span', { className: 'text-white font-bold' }, REAL.ratio),
                                ' Engagement Lift'
                            )
                        ),
                        React.createElement('div', { className: 'flex items-center gap-2 text-sm' },
                            React.createElement('div', { className: 'w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center' },
                                React.createElement(Icon, { name: 'bar-chart', size: 16, className: 'text-purple-400' })
                            ),
                            React.createElement('span', { className: 'text-gray-300' },
                                React.createElement('span', { className: 'text-white font-bold' }, REAL.completion + '%'),
                                ' Completion'
                            )
                        )
                    ),
                    React.createElement('div', { className: 'flex flex-col sm:flex-row gap-5 justify-center items-center' },
                        React.createElement('a', { href: 'demo.html', className: 'btn-primary px-8 py-4 rounded-xl font-bold text-white text-lg flex items-center gap-3 w-full sm:w-auto justify-center min-w-[200px] shadow-lg shadow-purple-500/20' },
                            React.createElement(Icon, { name: 'play-circle', size: 20, className: 'fill-current' }),
                            'Launch Demo'
                        ),
                        React.createElement('a', { href: 'chart.html', className: 'btn-secondary px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-3 w-full sm:w-auto justify-center min-w-[200px]' },
                            React.createElement(Icon, { name: 'bar-chart-3', size: 20 }),
                            'View Data'
                        )
                    ),
                    React.createElement('div', { className: 'flex flex-col sm:flex-row gap-4 justify-center items-center mt-6' },
                        React.createElement('a', { href: 'storyboard.html', className: 'px-6 py-3 rounded-xl font-semibold text-sm flex items-center gap-2 text-gray-400 hover:text-white transition border border-white/10 hover:border-white/30' },
                            React.createElement(Icon, { name: 'film', size: 16 }),
                            'GIF Storyboard'
                        ),
                        React.createElement('a', { href: 'https://drive.google.com/file/d/1NKfFQWqze6dm7AEcDtFYx2HdhDPnYhXI/view?usp=sharing', target: '_blank', className: 'px-6 py-3 rounded-xl font-semibold text-sm flex items-center gap-2 text-gray-400 hover:text-white transition border border-white/10 hover:border-white/30' },
                            React.createElement(Icon, { name: 'presentation', size: 16 }),
                            'Pitch Deck'
                        )
                    )
                )
            );
        }

        function HowItWorks() {
            const steps = [
                { icon: 'eye', title: 'Prime', desc: 'Mystery prompt captures attention before the ad loads.', color: '#a855f7' },
                { icon: 'play', title: 'Watch', desc: 'Brand video plays in full. Users watch voluntarily.', color: '#3b82f6' },
                { icon: 'fingerprint', title: 'Verify', desc: 'Quick challenge proves real attention. Tap or hold.', color: '#06b6d4' },
                { icon: 'gift', title: 'Reward', desc: 'Variable tier reward unlocks. Gold / Silver / Bronze.', color: '#22c55e' }
            ];
            return React.createElement('section', { className: 'py-24 px-4 bg-black/30' },
                React.createElement('div', { className: 'max-w-5xl mx-auto' },
                    React.createElement('div', { className: 'text-center mb-16' },
                        React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' }, 'How It Works'),
                        React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto' }, 'Four steps from impression to verified attention.')
                    ),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-6' },
                        steps.map((s, i) => React.createElement('div', { key: i, className: 'text-center' },
                            React.createElement('div', { className: 'w-16 h-16 mx-auto mb-4 rounded-2xl flex items-center justify-center', style: { background: s.color + '15', border: '1px solid ' + s.color + '33' } },
                                React.createElement(Icon, { name: s.icon, size: 28, className: '', style: { color: s.color } })
                            ),
                            React.createElement('div', { className: 'font-mono text-xs text-gray-500 mb-2' }, `Step ${i + 1}`),
                            React.createElement('h3', { className: 'text-lg font-bold text-white mb-2' }, s.title),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, s.desc)
                        ))
                    )
                )
            );
        }

        function FrictionComparison() {
            const items = [
                { label: 'Forced Video (AdMob)', score: 9.2, barColor: '#ef4444', textColor: '#f87171', note: 'Unskippable, interruptive' },
                { label: 'Rewarded Video (Standard)', score: 5.5, barColor: '#eab308', textColor: '#facc15', note: 'Opt-in, no engagement loop' },
                { label: 'AdQuest Protocol', score: 1.8, barColor: '#22c55e', textColor: '#4ade80', note: 'Gamified, reward-aligned' }
            ];
            return React.createElement('section', { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto' },
                    React.createElement('div', { className: 'text-center mb-16' },
                        React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' },
                            'Friction ',
                            React.createElement('span', { className: 'gradient-green' }, 'Reimagined')
                        ),
                        React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto' },
                            'Traditional ads create friction. AdQuest reduces it through variable reward alignment.'
                        )
                    ),
                    React.createElement('div', { className: 'space-y-6' },
                        items.map((item, i) => React.createElement('div', { key: i, className: 'glass rounded-2xl p-6' },
                            React.createElement('div', { className: 'flex items-center justify-between mb-3' },
                                React.createElement('span', { className: 'font-bold text-white text-sm' }, item.label),
                                React.createElement('span', { className: 'font-mono font-bold text-lg', style: { color: item.textColor } }, item.score + '/10')
                            ),
                            React.createElement('div', { className: 'friction-bar bg-white/5' },
                                React.createElement('div', {
                                    className: 'friction-fill border-r-2',
                                    style: { width: (item.score * 10) + '%', background: item.barColor + '30', borderColor: item.barColor }
                                }),
                                React.createElement('span', { className: 'friction-label', style: { color: item.textColor } }, item.note)
                            )
                        ))
                    ),
                    React.createElement('div', { className: 'mt-8 glass rounded-xl p-6 border-l-4 border-blue-500' },
                        React.createElement('p', { className: 'text-sm text-gray-300' },
                            React.createElement('span', { className: 'text-blue-400 font-bold' }, 'Note:'),
                            ' Friction scores are modeled from engagement patterns in our prototype tests. Larger sample needed for validation.'
                        )
                    )
                )
            );
        }

        function VariableRewards() {
            const tiers = [
                { name: 'TIER A', label: 'Gold', gems: '+10', criteria: 'First try, no hints', color: '#eab308' },
                { name: 'TIER B', label: 'Silver', gems: '+5', criteria: '< 2 attempts', color: '#3b82f6' },
                { name: 'TIER C', label: 'Bronze', gems: '+3', criteria: 'Completed', color: '#9ca3af' }
            ];
            return React.createElement('section', { className: 'py-24 px-4 bg-black/30' },
                React.createElement('div', { className: 'max-w-5xl mx-auto' },
                    React.createElement('div', { className: 'text-center mb-16' },
                        React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' },
                            'Variable ',
                            React.createElement('span', { className: 'gradient-text' }, 'Reward System')
                        ),
                        React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto' },
                            'Users compete for higher reward tiers. Engagement becomes part of the game loop.'
                        )
                    ),
                    React.createElement('div', { className: 'grid md:grid-cols-3 gap-6' },
                        tiers.map((t, i) => React.createElement('div', {
                            key: i, className: 'glass rounded-2xl p-8 hover:bg-white/5 transition-all hover:-translate-y-1 border border-white/5'
                        },
                            React.createElement('div', { className: 'font-mono text-xs tracking-widest mb-4', style: { color: t.color } }, t.name),
                            React.createElement('div', { className: 'text-4xl font-black text-white mb-2' }, t.gems),
                            React.createElement('div', { className: 'font-bold mb-4', style: { color: t.color } }, t.label),
                            React.createElement('div', { className: 'text-sm text-gray-400' }, t.criteria)
                        ))
                    )
                )
            );
        }

        function Features() {
            const cards = [
                { title: "Mystery Primer", desc: "Captures attention before the ad loads. Zero cold-start friction.", icon: "search" },
                { title: "Hold-to-Verify", desc: "Physical engagement proves real attention. Not a passive click.", icon: "fingerprint" },
                { title: "Zero-Trust Audit", desc: "Every metric tracked server-side. No inflated impressions.", icon: "shield-check" }
            ];
            return React.createElement('section', { className: 'py-20 px-4' },
                React.createElement('div', { className: 'max-w-6xl mx-auto grid md:grid-cols-3 gap-8' },
                    cards.map((c, i) => React.createElement('div', { key: i, className: 'glass rounded-2xl p-8 hover:bg-white/5 transition border border-white/5' },
                        React.createElement('div', { className: 'bg-blue-500/10 w-12 h-12 rounded-lg flex items-center justify-center mb-4 text-blue-400' },
                            React.createElement(Icon, { name: c.icon, size: 24 })
                        ),
                        React.createElement('h3', { className: 'text-xl font-bold text-white mb-2' }, c.title),
                        React.createElement('p', { className: 'text-gray-400 text-sm' }, c.desc)
                    ))
                )
            );
        }

        function RealData() {
            return React.createElement('section', { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto text-center' },
                    React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' },
                        'Verified by ',
                        React.createElement('span', { className: 'gradient-text' }, 'Real Data')
                    ),
                    React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto mb-12' },
                        'In our A/B test, the control group clicked a button and were forced to wait 10 seconds for a reward. Most abandoned before the wait ended (avg 6.9s). AdQuest users voluntarily watched a video and solved a challenge — staying 2x longer (avg 13.7s). ',
                        React.createElement('span', { className: 'text-white font-mono' }, REAL.users),
                        ' unique real users.'
                    ),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                        [
                            { n: REAL.ratio, l: 'Engagement Lift', color: '#60a5fa' },
                            { n: REAL.controlAvg + 's', l: 'Control Avg', color: '#9ca3af' },
                            { n: REAL.adquestAvg + 's', l: 'AdQuest Avg', color: '#4ade80' },
                            { n: REAL.completion + '%', l: 'Completion Rate', color: '#c084fc' }
                        ].map((s, i) => React.createElement('div', { key: i, className: 'glass rounded-xl p-6' },
                            React.createElement('div', { className: 'text-3xl font-black mb-2', style: { color: s.color } }, s.n),
                            React.createElement('div', { className: 'text-xs text-gray-400' }, s.l)
                        ))
                    ),
                    React.createElement('div', { className: 'mt-8 flex flex-col sm:flex-row gap-4 justify-center' },
                        React.createElement('a', { href: 'chart.html', className: 'btn-secondary px-6 py-3 rounded-xl font-bold text-sm inline-flex items-center gap-2' },
                            React.createElement(Icon, { name: 'external-link', size: 16 }),
                            'Open Full Report'
                        ),
                        React.createElement('a', { href: 'real_data.csv', className: 'btn-secondary px-6 py-3 rounded-xl font-bold text-sm inline-flex items-center gap-2' },
                            React.createElement(Icon, { name: 'download', size: 16 }),
                            'Download CSV'
                        )
                    )
                )
            );
        }

        function Economics() {
            return React.createElement('section', { className: 'py-24 px-4 bg-black/30' },
                React.createElement('div', { className: 'max-w-4xl mx-auto text-center' },
                    React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' }, 'Attention-Based Revenue'),
                    React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto mb-4' },
                        'Higher verified attention = higher revenue share for publishers.'
                    ),
                    React.createElement('div', { className: 'inline-block px-4 py-1.5 rounded-full bg-yellow-500/10 border border-yellow-500/30 mb-8' },
                        React.createElement('span', { className: 'text-yellow-400 text-xs font-bold uppercase tracking-wider' }, 'Planned — Not Yet Implemented')
                    ),
                    React.createElement('div', { className: 'grid md:grid-cols-3 gap-4 items-end h-[300px]' },
                        React.createElement('div', { className: 'flex flex-col items-center justify-end h-full w-full opacity-60' },
                            React.createElement('div', { className: 'text-gray-400 text-xs mb-2' }, 'Tier C (Bronze)'),
                            React.createElement('div', { className: 'w-full bg-gray-800 rounded-t-lg h-[30%] border-t border-gray-600 flex items-center justify-center' },
                                React.createElement('span', { className: 'text-xs font-mono' }, 'Base Rate')
                            )
                        ),
                        React.createElement('div', { className: 'flex flex-col items-center justify-end h-full w-full' },
                            React.createElement('div', { className: 'text-blue-400 text-xs mb-2 font-bold' }, 'Tier B (Silver)'),
                            React.createElement('div', { className: 'w-full bg-blue-900/40 rounded-t-lg h-[60%] border-t border-blue-500 flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.2)]' },
                                React.createElement('span', { className: 'text-xl font-bold text-white' }, '+50%')
                            )
                        ),
                        React.createElement('div', { className: 'flex flex-col items-center justify-end h-full w-full' },
                            React.createElement('div', { className: 'text-yellow-400 text-xs mb-2 font-bold' }, 'Tier A (Gold)'),
                            React.createElement('div', { className: 'w-full bg-gradient-to-t from-yellow-900/40 to-yellow-600/40 rounded-t-lg h-[100%] border-t border-yellow-400 flex items-center justify-center shadow-[0_0_40px_rgba(234,179,8,0.3)]' },
                                React.createElement('span', { className: 'text-3xl font-black text-white' }, '+100%')
                            )
                        )
                    )
                )
            );
        }

        function DemoPreview() {
            return React.createElement('section', { className: 'py-24 px-4' },
                React.createElement('div', { className: 'max-w-4xl mx-auto text-center' },
                    React.createElement('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-4' },
                        'See It in ',
                        React.createElement('span', { className: 'gradient-text' }, 'Action')
                    ),
                    React.createElement('p', { className: 'text-gray-400 max-w-xl mx-auto mb-8' },
                        'Complete flow: game screen → video → challenge → reward.'
                    ),
                    React.createElement('div', { className: 'relative inline-block' },
                        React.createElement('div', { className: 'absolute inset-0 bg-gradient-to-r from-purple-500/20 to-blue-500/20 blur-3xl rounded-full' }),
                        React.createElement('img', {
                            src: 'adquest-demo.gif', alt: 'AdQuest Demo Flow',
                            className: 'relative rounded-2xl border border-white/10 shadow-2xl max-w-full',
                            style: { maxHeight: '400px' }
                        })
                    ),
                    React.createElement('div', { className: 'mt-8 flex flex-col sm:flex-row gap-4 justify-center' },
                        React.createElement('a', { href: 'demo.html', className: 'btn-primary px-6 py-3 rounded-xl font-bold text-sm inline-flex items-center gap-2' },
                            React.createElement(Icon, { name: 'play', size: 16 }),
                            'Try Interactive Demo'
                        )
                    )
                )
            );
        }

        function App() {
            return React.createElement('div', { className: 'min-h-screen text-white' },
                React.createElement(Hero),
                React.createElement(HowItWorks),
                React.createElement(FrictionComparison),
                React.createElement(VariableRewards),
                React.createElement(Features),
                React.createElement(RealData),
                React.createElement(DemoPreview),
                React.createElement(Economics),
                React.createElement('footer', { className: 'py-8 text-center text-gray-600 text-xs font-mono border-t border-white/5 mt-12' },
                    '© 2026 AdQuest Protocol v9.0 · Data: data_evidence.txt (93 verified users)'
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
